name: colonoscopy-esfpnet-upstream
channels:
  - pytorch
  - conda-forge
dependencies:
  - python=3.8
  - pytorch=1.11.0
  - torchvision=0.12.0
  - cudatoolkit=11.3
  - pip
  - pip:
      - mmcv-full -f https://download.openmmlab.com/mmcv/dist/cu113/torch1.11.0/index.html
      - timm==0.5.4
      - imageio
      - scikit-image
      - pyyaml
      - pillow
      - numpy
      - matplotlib
      - opencv-python
