name: colonoscopy-cascade-upstream
channels:
  - pytorch
  - conda-forge
dependencies:
  - python=3.8
  - pytorch=1.11.0
  - torchvision=0.12.0
  - cudatoolkit=11.3
  - conda-forge::opencv
  - conda-forge::mmcv-full
  - pip
  - pip:
      - loguru
      - tqdm
      - pyyaml
      - pandas
      - matplotlib
      - scikit-learn
      - scikit-image
      - scipy
      - seaborn
      - albumentations
      - tabulate
      - warmup-scheduler
      - timm==0.5.4
      - ml-collections
      - einops
      - pthflops
      - torchsummary
      - thop
