name: colonoscopy-cascade-upstream
channels:
  - pytorch
  - conda-forge
dependencies:
  - python=3.8
  - pytorch=1.11.0
  - torchvision=0.12.0
  - cudatoolkit=11.3
  - pip
  - pip:
      - loguru
      - tqdm
      - pyyaml
      - pandas
      - matplotlib
      - scikit-learn
      - scikit-image
      - scipy
      - opencv-python
      - seaborn
      - albumentations
      - tabulate
      - warmup-scheduler
      - mmcv-full -f https://download.openmmlab.com/mmcv/dist/cu113/torch1.11.0/index.html
      - einops
      - pthflops
      - torchsummary
      - thop
