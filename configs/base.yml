seed: 42

paths:
  data_root: data/raw
  checkpoints: checkpoints
  outputs: outputs

data:
  dataset: kvasir
  image_size: 352
  split:
    train: 0.8
    val: 0.1
    test: 0.1
  num_workers: 4
  pin_memory: true

training:
  epochs: 200
  batch_size: 8
  optimizer:
    name: adam
    lr: 1.0e-4
    weight_decay: 1.0e-5
  scheduler:
    name: cosine
    min_lr: 1.0e-6
  save_best_metric: dice

evaluation:
  metrics:
    - dice
    - iou
    - precision
    - recall

logging:
  wandb: false
  log_every_n_epochs: 5